<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unischooly Progress Report</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark: #06121c;
      --bg-deep: #081c2a;
      --card: rgba(255,255,255,0.08);
      --card-2: rgba(10,20,35,0.55);
      --border: rgba(255,255,255,0.10);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --soft: #94a3b8;
      --teal: #2dd4bf;
      --cyan: #38bdf8;
      --gold: #fbbf24;
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(45,212,191,0.18), transparent 18%),
        radial-gradient(circle at 85% 10%, rgba(56,189,248,0.14), transparent 20%),
        linear-gradient(180deg, #04111b 0%, #071827 45%, #04111b 100%);
      color: var(--text);
      padding: 24px;
      min-height: 100vh;
    }

    .container {
      max-width: 1220px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px;
      margin-bottom: 22px;
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 34px 30px;
      background:
        radial-gradient(circle at top right, rgba(45,212,191,0.16), transparent 26%),
        linear-gradient(135deg, rgba(45,212,191,0.10), rgba(56,189,248,0.08), rgba(255,255,255,0.02));
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      pointer-events: none;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .brand-box {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 12px 16px;
      border-radius: 18px;
    }

    .brand-box img {
      height: 42px;
      width: auto;
      display: block;
    }

    .brand-text small {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: #c7f9f1;
      margin-bottom: 3px;
    }

    .brand-text strong {
      font-size: 16px;
      color: white;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      outline: 0;
      cursor: pointer;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      font-size: 14px;
      transition: 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(90deg, var(--teal), var(--cyan));
      color: #042032;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.10);
      color: white;
      border: 1px solid rgba(255,255,255,0.10);
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .title {
      font-size: 54px;
      line-height: 1.02;
      font-weight: 800;
      margin-top: 22px;
      margin-bottom: 14px;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      font-size: 21px;
      line-height: 1.6;
      color: #e2e8f0;
      max-width: 980px;
      position: relative;
      z-index: 1;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
      position: relative;
      z-index: 1;
    }

    .pill {
      background: rgba(255,255,255,0.11);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 11px 16px;
      font-size: 14px;
      color: white;
      font-weight: 700;
    }

    .section-eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: #99f6e4;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .section-title {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .mini-card {
      background: linear-gradient(180deg, rgba(2,6,23,0.48), rgba(15,23,42,0.36));
      border-radius: var(--radius-md);
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--soft);
      margin-bottom: 8px;
    }

    .value {
      font-size: 19px;
      font-weight: 800;
      line-height: 1.4;
      color: white;
    }

    .small-text {
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
    }

    .summary-box {
      text-align: center;
      padding: 22px 18px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(2,6,23,0.55), rgba(15,23,42,0.34));
      border: 1px solid rgba(255,255,255,0.08);
    }

    .summary-icon {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .summary-number {
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }

    .grade-card {
      background: linear-gradient(180deg, rgba(2,6,23,0.52), rgba(15,23,42,0.34));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 22px;
      text-align: center;
    }

    .grade-letter {
      font-size: 42px;
      font-weight: 900;
      line-height: 1;
      margin: 10px 0 8px;
      color: white;
    }

    .grade-line {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
      margin: 14px 0 10px;
    }

    .grade-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teal), var(--cyan));
    }

    .project-card {
      overflow: hidden;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(2,6,23,0.52), rgba(15,23,42,0.34));
      border: 1px solid rgba(255,255,255,0.08);
    }

    .project-image {
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 62px;
      background:
        radial-gradient(circle at top, rgba(45,212,191,0.18), transparent 30%),
        linear-gradient(135deg, rgba(45,212,191,0.10), rgba(56,189,248,0.08), rgba(255,255,255,0.02));
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .project-content {
      padding: 18px;
    }

    .teacher-card {
      background:
        linear-gradient(180deg, rgba(251,191,36,0.10), rgba(255,255,255,0.03)),
        linear-gradient(180deg, rgba(2,6,23,0.48), rgba(15,23,42,0.34));
      border: 1px solid rgba(251,191,36,0.16);
    }

    .renewal-card {
      background:
        radial-gradient(circle at top right, rgba(45,212,191,0.14), transparent 30%),
        linear-gradient(135deg, rgba(45,212,191,0.10), rgba(56,189,248,0.06), rgba(255,255,255,0.03));
      border: 1px solid rgba(45,212,191,0.18);
    }

    .renewal-highlight {
      margin-top: 18px;
      background: rgba(2,6,23,0.42);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 18px;
    }

    .progress-box {
      background: rgba(2,6,23,0.46);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      padding: 22px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.10);
      border-radius: 999px;
      overflow: hidden;
      margin: 14px 0 10px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teal), var(--cyan));
    }

    .badge-box {
      text-align: center;
      padding: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(2,6,23,0.26));
    }

    .badge-emoji {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      font-size: 34px;
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .roadmap-item {
      margin-bottom: 12px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(2,6,23,0.42);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .footer-note {
      text-align: center;
      color: var(--soft);
      font-size: 13px;
      margin-top: 12px;
    }

    .loading, .error {
      font-size: 22px;
      text-align: center;
      padding: 50px;
      color: white;
    }

    @media print {
      body {
        background: white !important;
        color: black !important;
        padding: 0;
      }
      .btn, .footer-note {
        display: none !important;
      }
      .card, .project-card, .grade-card, .summary-box, .mini-card {
        box-shadow: none !important;
        break-inside: avoid;
      }
    }

    @media (max-width: 1100px) {
      .grid-4, .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .title { font-size: 42px; }
      .subtitle { font-size: 18px; }
    }

    @media (max-width: 860px) {
      body { padding: 14px; }
      .grid-2, .grid-3, .grid-4, .summary-grid {
        grid-template-columns: 1fr;
      }
      .title { font-size: 34px; }
      .subtitle { font-size: 17px; }
      .card { padding: 20px; border-radius: 24px; }
      .section-title { font-size: 24px; }
      .project-image { height: 160px; font-size: 52px; }
      .hero-actions { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading">Loading report card...</div>
  </div>

  <script>
    const SUPABASE_URL = "https://binklfyiypbhuzsvnlzg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpbmtsZnlpeXBiaHV6c3ZubHpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUwMzA5NjgsImV4cCI6MjA4MDYwNjk2OH0.PYCRN7ubQA2XnVy8BYd6746iAGATjBuBAlvsCdLdbqw";

    const BRAND_LOGO = "https://res.cloudinary.com/dpapyknn4/image/upload/v1763143023/Unischooly_Horizontal_logo_qbu1l7.svg";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function getTokenFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get("token");
    }

    function safeArray(value) {
      if (Array.isArray(value)) return value;
      return [];
    }

    function getGrade(value) {
      if (value >= 90) return "A+";
      if (value >= 85) return "A";
      if (value >= 80) return "A-";
      if (value >= 75) return "B+";
      if (value >= 70) return "B";
      return "B-";
    }

    function getDescriptor(value) {
      if (value >= 90) return "Excellent Progress";
      if (value >= 85) return "Strong Performance";
      if (value >= 80) return "Growing Strongly";
      if (value >= 75) return "Good Development";
      return "Steady Progress";
    }

    function getProjectEmoji(projectName) {
      const name = (projectName || "").toLowerCase();
      if (name.includes("maze")) return "🐰";
      if (name.includes("sandwich")) return "🥪";
      if (name.includes("time")) return "⏳";
      if (name.includes("frog")) return "🐸";
      if (name.includes("butterfly")) return "🦋";
      if (name.includes("water")) return "🌧️";
      if (name.includes("rocket")) return "🚀";
      return "💡";
    }

    function buildShareLink() {
      return window.location.href;
    }

    function shareWhatsApp() {
      const url = buildShareLink();
      const text = `Hi, here is the Unischooly progress report: ${url}`;
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
    }

    function downloadPDF() {
      window.print();
    }

    async function loadReportCard() {
      const token = getTokenFromURL();
      const app = document.getElementById("app");

      if (!token) {
        app.innerHTML = '<div class="error">Token missing in URL. Example: ?token=elijah-uk-001</div>';
        return;
      }

      const { data, error } = await supabaseClient
        .from("student_report_cards")
        .select("*")
        .eq("report_token", token)
        .eq("is_active", true)
        .single();

      if (error || !data) {
        app.innerHTML = '<div class="error">Report card not found.</div>';
        return;
      }

      const projects = safeArray(data.projects);
      const skills = safeArray(data.skills);
      const badges = safeArray(data.badges);
      const nextPathway = safeArray(data.next_pathway);

      const certificateTarget = data.certificate_target || 20;
      const classesConsumed = data.classes_consumed || 0;
      const classesPaid = data.classes_paid || 0;
      const classesAway = Math.max(certificateTarget - classesConsumed, 0);
      const progressWidth = Math.min((classesConsumed / certificateTarget) * 100, 100);

      const featuredProjects = projects.slice(0, 4);

      app.innerHTML = `
        <div class="card hero">
          <div class="hero-top">
            <div class="brand-box">
              <img src="${BRAND_LOGO}" alt="Unischooly logo" />
              <div class="brand-text">
                <small>Premium Parent Report</small>
                <strong>Unischooly Progress Card</strong>
              </div>
            </div>

            <div class="hero-actions">
              <button class="btn btn-primary" onclick="downloadPDF()">⬇ Download Report</button>
              <button class="btn btn-secondary" onclick="shareWhatsApp()">📲 Share on WhatsApp</button>
            </div>
          </div>

          <div class="title">${data.student_name || "Student"}'s Progress Report</div>
          <div class="subtitle">
            A premium monthly learning snapshot celebrating progress, project achievements, future-ready growth,
            and the next stage of ${data.student_name || "the student"}'s learning journey at Unischooly.
          </div>

          <div class="pill-row">
            <div class="pill">Programme: ${data.program || "-"}</div>
            <div class="pill">Grade: ${data.grade || "-"}</div>
            <div class="pill">Classes Completed: ${classesConsumed}</div>
            <div class="pill">Certificate Target: ${certificateTarget}</div>
          </div>
        </div>

        <div class="card">
          <div class="section-eyebrow">This Month At A Glance</div>
          <div class="section-title">What ${data.student_name || "the student"} Achieved</div>

          <div class="summary-grid">
            <div class="summary-box">
              <div class="summary-icon">🎓</div>
              <div class="summary-number">${classesConsumed}</div>
              <div class="small-text">Classes Completed</div>
            </div>

            <div class="summary-box">
              <div class="summary-icon">🚀</div>
              <div class="summary-number">${projects.length}</div>
              <div class="small-text">Projects Built</div>
            </div>

            <div class="summary-box">
              <div class="summary-icon">🏅</div>
              <div class="summary-number">${badges.length}</div>
              <div class="small-text">Badges Earned</div>
            </div>

            <div class="summary-box">
              <div class="summary-icon">📈</div>
              <div class="summary-number">${classesAway}</div>
              <div class="small-text">Classes To Level 1</div>
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="section-eyebrow">Student Snapshot</div>
            <div class="section-title">Learner Profile</div>

            <div class="grid-2">
              <div class="mini-card"><div class="label">Student Name</div><div class="value">${data.student_name || "-"}</div></div>
              <div class="mini-card"><div class="label">Parent Name</div><div class="value">${data.parent_name || "-"}</div></div>
              <div class="mini-card"><div class="label">Teacher</div><div class="value">${data.teacher_name || "-"}</div></div>
              <div class="mini-card"><div class="label">Relationship Manager</div><div class="value">${data.relationship_manager || "-"}</div></div>
              <div class="mini-card"><div class="label">Subscription</div><div class="value">${data.subscription_name || "-"}</div></div>
              <div class="mini-card"><div class="label">Amount Paid</div><div class="value">${data.amount_paid || "-"}</div></div>
            </div>
          </div>

          <div class="card renewal-card">
            <div class="section-eyebrow">Milestone Progress</div>
            <div class="section-title">Level 1 Certificate Journey</div>

            <div class="progress-box">
              <div class="label">Certificate Progress</div>
              <div class="value">${classesConsumed}/${certificateTarget} Classes Completed</div>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${progressWidth}%"></div>
              </div>
              <div class="small-text">${classesAway} more classes to unlock Level 1 Certification</div>
            </div>

            <div class="renewal-highlight">
              <div class="label">Why Continue Now</div>
              <div class="small-text">
                ${data.student_name || "The student"} has completed the foundation stage and is now at the ideal point to move into stronger independent project work, deeper logic confidence, and visible certificate progress.
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-eyebrow">Skill Performance</div>
          <div class="section-title">Future-Ready Learning Grades</div>

          <div class="grid-4">
            ${gradeCardHTML("🧠", "Curiosity", data.curiosity_score || 0)}
            ${gradeCardHTML("💬", "Confidence", data.confidence_index || 0)}
            ${gradeCardHTML("💪", "Resilience", data.resilience_rating || 0)}
            ${gradeCardHTML("🌟", "Future Readiness", data.future_readiness || 0)}
          </div>
        </div>

        <div class="card">
          <div class="section-eyebrow">Featured Work</div>
          <div class="section-title">Project Highlights</div>

          <div class="grid-2">
            ${featuredProjects.map(project => `
              <div class="project-card">
                <div class="project-image">${getProjectEmoji(project)}</div>
                <div class="project-content">
                  <div class="label">Featured Project</div>
                  <div class="value">${project}</div>
                  <div class="small-text" style="margin-top:10px;">
                    Built through guided coding, creativity, and growing confidence in structured project execution.
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>

        <div class="grid-2">
          <div class="card teacher-card">
            <div class="section-eyebrow">Teacher Reflection</div>
            <div class="section-title">What ${data.teacher_name || "the teacher"} Observed</div>
            <div class="small-text">${data.teacher_reflection || "-"}</div>
          </div>

          <div class="card">
            <div class="section-eyebrow">Recognition</div>
            <div class="section-title">Achievement Badges</div>

            <div class="grid-3">
              ${badges.map(badge => `
                <div class="mini-card badge-box">
                  <div class="badge-emoji">${badge.emoji || "🏆"}</div>
                  <div class="value">${badge.title || "Achievement"}</div>
                  <div class="small-text" style="margin-top:10px;">${badge.text || ""}</div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <div class="section-eyebrow">Next Level</div>
            <div class="section-title">What Comes Next</div>
            ${nextPathway.map(item => `
              <div class="roadmap-item">
                <div class="small-text">✦ ${item}</div>
              </div>
            `).join("")}
          </div>

          <div class="card renewal-card">
            <div class="section-eyebrow">Continuation Note</div>
            <div class="section-title">Why This Is The Right Time To Continue</div>
            <div class="small-text">${data.progress_summary || "-"}</div>

            <div class="renewal-highlight">
              <div class="label">Parent Action</div>
              <div class="value" style="margin-bottom:10px;">Continue now to strengthen confidence and unlock certificate progress</div>
              <div class="small-text">
                Another monthly cycle will help ${data.student_name || "the student"} build stronger independent coding ability, deeper project completion confidence, and continued momentum toward Level 1 achievement.
              </div>
            </div>
          </div>
        </div>

        <div class="footer-note">
          Unischooly • Premium Progress Report • Shareable by link and downloadable as PDF
        </div>
      `;
    }

    function gradeCardHTML(icon, label, value) {
      return `
        <div class="grade-card">
          <div style="font-size:28px;">${icon}</div>
          <div class="label" style="margin-top:10px;">${label}</div>
          <div class="grade-letter">${getGrade(value)}</div>
          <div class="small-text">${getDescriptor(value)}</div>
          <div class="grade-line">
            <div class="grade-fill" style="width:${value}%"></div>
          </div>
        </div>
      `;
    }

    loadReportCard();
  </script>
</body>
</html>
